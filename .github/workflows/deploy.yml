jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - run: |
      cd tools/AnimPSD
      npm install
      npm run build

  - uses: actions/upload-pages-artifact@v3
    with:
      path: tools/AnimPSD/dist
```

deploy:
needs: build
runs-on: ubuntu-latest

```
permissions:
  pages: write
  id-token: write

environment:
  name: github-pages

steps:
  - id: deployment
    uses: actions/deploy-pages@v4
```
