name: Deploy PSD Generator

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
  environment:
  name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 【最重要】ここでフォルダを移動してビルドする
      - name: Install and Build
        run: |
          cd tools/AnimPSD
          npm install
          npm run build

      # 【最重要】ビルド結果（dist）をアップロードする
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'tools/AnimPSD/dist'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
