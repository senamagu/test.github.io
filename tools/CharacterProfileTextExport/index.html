<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>キャラプロフィールTXTメーカー</title>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f5f5f5; color: #222; }
    .page { max-width: 1200px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .card { background: #fff; border: 1px solid #d4d4d4; border-radius: 24px; padding: 24px; }
    .field { border: 1px solid #d4d4d4; border-radius: 16px; padding: 12px; margin-bottom: 12px; }
    input[type="text"], textarea { width: 100%; box-sizing: border-box; border: 1px solid #cfcfcf; border-radius: 12px; padding: 12px; }
    textarea { min-height: 96px; }
    .preview { min-height: 60vh; border: 1px solid #d4d4d4; border-radius: 16px; padding: 16px; white-space: pre-wrap; font-family: monospace; line-height: 1.7; }
    .buttons { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
    button { border-radius: 16px; padding: 12px 16px; border: 1px solid #cfcfcf; background: #fff; cursor: pointer; }
    .primary { background: #111; color: #fff; border-color: #111; }
    #pngPreview img { width: 100%; border: 1px solid #d4d4d4; border-radius: 16px; margin-top: 16px; }
    @media (max-width: 900px) { .page { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>キャラプロフィールTXTメーカー</h1>
      <div id="fields"></div>
    </div>
    <div class="card">
      <h2>出力プレビュー</h2>
      <div id="preview" class="preview"></div>
      <div class="buttons">
        <button class="primary" onclick="copyText()">コピー</button>
        <button onclick="saveText()">TXT保存</button>
        <button onclick="savePngPreview()">PNGプレビュー生成</button>
      </div>
      <p id="status"></p>
      <div id="pngPreview"></div>
    </div>
  </div>

  <script>
    const fields = [
      ["name", "名前", false], ["reading", "よみがな", false], ["job", "職業", false],
      ["age", "年齢", false], ["gender", "性別", false], ["height", "身長", false],
      ["birthday", "誕生日", false], ["feature", "特徴表", true], ["profile", "Profile", true],
      ["firstPerson", "一人称", false], ["secondPerson", "二人称", false],
      ["hate", "嫌い", false], ["like", "好き", false], ["voice", "Sample Voice", true],
      ["background", "Background", true], ["origin", "由来", true]
    ];

    const values = {};
    const enabled = {};
    const fallback = "不明";

    const fieldsRoot = document.getElementById("fields");
    fields.forEach(([key, label, multiline]) => {
      values[key] = "";
      enabled[key] = true;
      const wrap = document.createElement("div");
      wrap.className = "field";
      wrap.innerHTML = `
        <label><input type="checkbox" checked data-key="${key}" class="toggle"> ${label} をコピー範囲に含める</label>
        ${multiline ? `<textarea data-key="${key}" placeholder="${fallback}"></textarea>` : `<input type="text" data-key="${key}" placeholder="${fallback}">`}
      `;
      fieldsRoot.appendChild(wrap);
    });

    fieldsRoot.addEventListener("input", (e) => {
      const key = e.target.dataset.key;
      if (!key) return;
      values[key] = e.target.value;
      render();
    });

    fieldsRoot.addEventListener("change", (e) => {
      if (!e.target.classList.contains("toggle")) return;
      const key = e.target.dataset.key;
      enabled[key] = e.target.checked;
      render();
    });

    function buildOutput() {
      const lines = [];
      const push = (text = "") => lines.push(text);
      if (enabled.name) {
        push("【名前】");
        push(values.name || fallback);
        if (enabled.reading) push(`(${values.reading || "よみがな"})`);
        push();
      }
      [["job","✶職業"],["age","✶年齢"],["gender","✶性別"],["height","✶身長"],["birthday","✶誕生日"]].forEach(([k,l]) => {
        if (enabled[k]) push(`${l}…${values[k] || fallback}`);
      });
      push();
      [["feature","▰ 特徴表"],["profile","▰ ᴾʳᵒᶠⁱˡᵉ"],["voice","▰ ˢᵃᵐᵖˡᵉ ⱽᵒⁱᶜᵉ"],["background","▰ ᴮᵃᶜᵏᴳʳᵒᵘⁿᵈ"],["origin","▰ 由来"]].forEach(([k,t]) => {
        if (enabled[k]) { push(t); push(values[k] || fallback); push(); }
      });
      return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }

    function render() {
      document.getElementById("preview").textContent = buildOutput();
    }

    function copyText() {
      navigator.clipboard.writeText(buildOutput());
      document.getElementById("status").textContent = "コピーしたぞ";
    }

    function saveText() {
      const blob = new Blob([buildOutput()], { type: "text/plain;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${values.name || "character_profile"}.txt`;
      a.click();
      document.getElementById("status").textContent = "TXTを保存したぞ";
    }

    function savePngPreview() {
      const text = buildOutput();
      const width = 1240, padding = 80, lineHeight = 52, perLine = 34;
      const wrapped = [];
      text.split("\n").forEach(line => {
        const t = line || " ";
        for (let i = 0; i < t.length; i += perLine) wrapped.push(t.slice(i, i + perLine));
        if (t.length === 0) wrapped.push(" ");
      });
      const height = Math.max(1754, padding * 2 + wrapped.length * lineHeight);
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#fff"; ctx.fillRect(0,0,width,height);
      ctx.fillStyle = "#222"; ctx.font = "32px monospace";
      let y = padding;
      wrapped.forEach(line => { ctx.fillText(line, padding, y); y += lineHeight; });
      const url = canvas.toDataURL("image/png");
      document.getElementById("pngPreview").innerHTML = `<h3>PNGプレビュー（長押し・右クリック保存）</h3><img src="${url}" alt="preview">`;
      document.getElementById("status").textContent = `PNG生成OK 高さ ${height}px`;
    }

    render();
  </script>
</body>
</html>
