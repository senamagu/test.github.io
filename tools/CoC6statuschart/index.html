<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CoC能力値一覧</title>

<style>
body{
    font-family:sans-serif;
    margin:20px;
}

#dropZone{
    border:2px dashed #999;
    padding:30px;
    text-align:center;
    margin-bottom:20px;
    border-radius:10px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}

th{
    background:#eee;
}

.controls{
    margin-bottom:15px;
}

.stats{
    margin-top:20px;
}

.rankings{
    margin-top:20px;
}

.card{
    border:1px solid #ccc;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
}
</style>
</head>
<body>

<h1>CoC能力値一覧</h1>

<div id="dropZone">
TXTファイルをドラッグ&ドロップ<br>
または
<br><br>
<input type="file" id="fileInput" multiple accept=".txt">
</div>

<div class="controls">

<select id="sortStat">
<option value="STR">STR</option>
<option value="CON">CON</option>
<option value="POW">POW</option>
<option value="DEX">DEX</option>
<option value="APP">APP</option>
<option value="SIZ">SIZ</option>
<option value="INT">INT</option>
<option value="EDU">EDU</option>
</select>

<select id="sortOrder">
<option value="asc">昇順</option>
<option value="desc">降順</option>
</select>

<button onclick="sortData()">並び替え</button>

<hr>

<select id="filterStat">
<option value="">能力値選択</option>
<option value="STR">STR</option>
<option value="CON">CON</option>
<option value="POW">POW</option>
<option value="DEX">DEX</option>
<option value="APP">APP</option>
<option value="SIZ">SIZ</option>
<option value="INT">INT</option>
<option value="EDU">EDU</option>
</select>

<select id="filterOp">
<option value="=">=</option>
<option value=">">></option>
<option value="<"><</option>
<option value=">=">>=</option>
<option value="<="><=</option>
</select>

<input type="number" id="filterValue">
<button onclick="applyFilter()">絞り込み</button>
<button onclick="clearFilter()">解除</button>

</div>

<table id="table">
<thead>
<tr>
<th>名前</th>
<th>STR</th>
<th>CON</th>
<th>POW</th>
<th>DEX</th>
<th>APP</th>
<th>SIZ</th>
<th>INT</th>
<th>EDU</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div class="stats" id="stats"></div>
<div class="rankings" id="rankings"></div>

<script>

const abilities=[
"STR","CON","POW","DEX",
"APP","SIZ","INT","EDU"
];

let characters=[];
let filtered=[];

document.getElementById("fileInput")
.addEventListener("change",e=>{
loadFiles(e.target.files);
});

const dropZone=document.getElementById("dropZone");

dropZone.addEventListener("dragover",e=>{
e.preventDefault();
});

dropZone.addEventListener("drop",e=>{
e.preventDefault();
loadFiles(e.dataTransfer.files);
});

function loadFiles(files){

for(const file of files){

const reader=new FileReader();

reader.onload=(e)=>{

const text=e.target.result;

const data=parseCharacter(text);

if(data){
characters.push(data);
filtered=[...characters];
render();
}
};

reader.readAsText(file,"UTF-8");
}
}

function parseCharacter(text){

const nameMatch=text.match(/名前:\s*(.+?)\s*\(/);

if(!nameMatch) return null;

const character={
name:nameMatch[1].trim()
};

for(const stat of abilities){

const regex=new RegExp(
`${stat}\\s+(\\d+)`
);

const match=text.match(regex);

character[stat]=match
? Number(match[1])
: 0;
}

return character;
}

function render(){

const tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

filtered.forEach(c=>{

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${c.name}</td>
<td>${c.STR}</td>
<td>${c.CON}</td>
<td>${c.POW}</td>
<td>${c.DEX}</td>
<td>${c.APP}</td>
<td>${c.SIZ}</td>
<td>${c.INT}</td>
<td>${c.EDU}</td>
`;

tbody.appendChild(tr);

});

renderStats();
renderRanking();
}

function sortData(){

const stat=
document.getElementById("sortStat").value;

const order=
document.getElementById("sortOrder").value;

filtered.sort((a,b)=>{

return order==="asc"
? a[stat]-b[stat]
: b[stat]-a[stat];

});

render();
}

function applyFilter(){

const stat=
document.getElementById("filterStat").value;

const op=
document.getElementById("filterOp").value;

const value=
Number(document.getElementById("filterValue").value);

filtered=characters.filter(c=>{

switch(op){

case "=":
return c[stat]===value;

case ">":
return c[stat]>value;

case "<":
return c[stat]<value;

case ">=":
return c[stat]>=value;

case "<=":
return c[stat]<=value;

default:
return true;
}

});

render();
}

function clearFilter(){

filtered=[...characters];
render();
}

function renderStats(){

let html="<h2>統計</h2>";

abilities.forEach(stat=>{

const values=
characters.map(c=>c[stat]);

if(values.length===0) return;

const max=Math.max(...values);
const min=Math.min(...values);

const maxChar=
characters.find(c=>c[stat]===max);

const minChar=
characters.find(c=>c[stat]===min);

const avg=
(values.reduce((a,b)=>a+b,0)
/values.length).toFixed(1);

html+=`
<div class="card">
<b>${stat}</b><br>
最高: ${maxChar.name} (${max})<br>
最低: ${minChar.name} (${min})<br>
平均: ${avg}
</div>
`;
});

document.getElementById("stats").innerHTML=html;
}

function renderRanking(){

let html="<h2>ランキング</h2>";

abilities.forEach(stat=>{

const rank=
[...characters]
.sort((a,b)=>b[stat]-a[stat]);

html+=`
<div class="card">
<b>${stat}</b><br>
`;

rank.forEach((c,index)=>{

html+=`
${index+1}位
${c.name}
(${c[stat]})<br>
`;

});

html+="</div>";
});

document.getElementById("rankings").innerHTML=html;
}

</script>

</body>
</html>
