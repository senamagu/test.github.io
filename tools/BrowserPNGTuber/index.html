<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Browser PNGTuber</title>

<style>

body{
    margin:0;
    overflow:hidden;
    width:100vw;
    height:100vh;
    background:#00ff00;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:sans-serif;
}

#characterWrap{

    position:relative;

    transition:
        transform 0.22s cubic-bezier(0.22,1,0.36,1),
        filter 0.18s ease,
        opacity 0.18s ease;

    will-change:transform,filter,opacity;
}

#character{

    position:relative;

    width:min(70vw,500px);
    aspect-ratio:1/1;
}

#character img{

    position:absolute;
    inset:0;

    width:100%;
    height:100%;

    object-fit:contain;

    opacity:0;

    transition:
        opacity 0.05s linear;

    backface-visibility:hidden;

    will-change:opacity;

    user-select:none;
    pointer-events:none;
}

#normal{
    opacity:1;
}

.visible{
    opacity:1 !important;
}

.controls{

    position:fixed;

    top:10px;
    left:10px;

    width:300px;
    max-height:85vh;

    overflow:auto;

    background:rgba(0,0,0,0.78);

    color:white;

    padding:12px;

    border-radius:16px;

    display:flex;
    flex-direction:column;
    gap:10px;

    z-index:999;

    backdrop-filter:blur(10px);
}

.closed{
    max-height:48px;
    overflow:hidden;
}

.section{

    border-top:
    1px solid rgba(255,255,255,0.15);

    padding-top:10px;

    display:flex;
    flex-direction:column;
    gap:10px;
}

.toggleBtn{

    width:100%;

    border:none;

    border-radius:10px;

    background:#222;

    color:white;

    padding:10px;

    font-size:14px;
}

label{

    display:flex;
    flex-direction:column;
    gap:4px;

    font-size:14px;
}

input,
select,
button{

    border:none;

    border-radius:8px;

    padding:8px;

    font-size:14px;
}

.rangeValue{

    font-size:12px;
    opacity:0.7;
}

</style>
</head>
<body>

<div class="controls" id="controls">

    <button
    class="toggleBtn"
    id="panelToggle">
        ▲ 閉じる
    </button>

    <div class="section">

        <label>
            通常立ち絵
            <input
            type="file"
            id="normalUpload"
            accept="image/*">
        </label>

        <label>
            発声立ち絵（未設定可）

            <input
            type="file"
            id="talkUpload"
            accept="image/*">

            <button
            type="button"
            id="removeTalkImage">
                発声立ち絵を解除
            </button>

        </label>

        <label>
            背景色
            <input
            type="color"
            id="bgColor"
            value="#00ff00">
        </label>

    </div>

    <div class="section">

        <label>
            感度
            <input
            type="range"
            id="threshold"
            min="1"
            max="100"
            value="20">
        </label>

        <label>
            口パク速度
            <input
            type="range"
            id="swapSpeed"
            min="40"
            max="300"
            value="120">

            <span
            class="rangeValue"
            id="swapSpeedValue"></span>

        </label>

    </div>

    <div class="section">

        <label>
            発声エフェクト

            <select id="effectMode">

                <option value="none">
                    なし
                </option>

                <option value="bounce">
                    ぴょこぴょこ
                </option>

                <option value="border">
                    枠
                </option>

            </select>

        </label>

        <label
        id="bounceStrengthWrap">

            ぴょこぴょこ強度

            <input
            type="range"
            id="bounceStrength"
            min="0"
            max="40"
            value="10">

        </label>

        <label
        id="bounceSpeedWrap">

            ぴょこぴょこ速度

            <input
            type="range"
            id="bounceSpeed"
            min="0.005"
            max="0.08"
            step="0.001"
            value="0.02">

        </label>

    </div>

    <div class="section">

        <label>
            無音エフェクト

            <select id="idleMode">

                <option value="none">
                    なし
                </option>

                <option value="dark">
                    暗くする
                </option>

                <option value="transparent">
                    半透明
                </option>

                <option value="small">
                    少し縮小
                </option>

            </select>

        </label>

        <label
        id="darkStrengthWrap">

            暗さ

            <input
            type="range"
            id="darkStrength"
            min="0.1"
            max="1"
            step="0.05"
            value="0.6">

        </label>

        <label
        id="transparentStrengthWrap">

            半透明

            <input
            type="range"
            id="transparentStrength"
            min="0.1"
            max="1"
            step="0.05"
            value="0.5">

        </label>

        <label
        id="smallStrengthWrap">

            縮小率

            <input
            type="range"
            id="smallStrength"
            min="0.7"
            max="1"
            step="0.01"
            value="0.95">

        </label>

    </div>

    <button id="startBtn">
        START
    </button>

</div>

<div id="characterWrap">

    <div id="character">

        <img
        id="normal"
        class="visible">

        <img
        id="talk">

    </div>

</div>

<script>

const STORAGE_KEY =
"browser_pngtuber_settings";

const normalImg =
document.getElementById("normal");

const talkImg =
document.getElementById("talk");

const characterWrap =
document.getElementById("characterWrap");

let hasTalkImage = false;

document
.getElementById("bgColor")
.addEventListener("input",(e)=>{

    document.body.style.background =
    e.target.value;

});

document
.getElementById("normalUpload")
.addEventListener("change",(e)=>{

    const file =
    e.target.files[0];

    if(file){

        normalImg.src =
        URL.createObjectURL(file);

    }

});

document
.getElementById("talkUpload")
.addEventListener("change",(e)=>{

    const file =
    e.target.files[0];

    if(file){

        talkImg.src =
        URL.createObjectURL(file);

        hasTalkImage = true;

    }

});

document
.getElementById("removeTalkImage")
.addEventListener("click",()=>{

    talkImg.src = "";

    hasTalkImage = false;

    showNormal();

});

function resetEffects(){

    characterWrap.style.transform = "";
    characterWrap.style.filter = "";
    characterWrap.style.opacity = "";

}

function applyTalkingEffect(mode){

    switch(mode){

        case "bounce":

            const strength =
            Number(
                document
                .getElementById("bounceStrength")
                .value
            );

            const speed =
            Number(
                document
                .getElementById("bounceSpeed")
                .value
            );

            const bounce =
            Math.sin(Date.now() * speed)
            * strength;

            characterWrap.style.transform =
            `translateY(${bounce}px)`;

        break;

        case "border":

            characterWrap.style.filter =
            "drop-shadow(0 0 12px white)";

        break;

    }

}

function applyIdleEffect(mode){

    switch(mode){

        case "dark":

            const dark =
            document
            .getElementById("darkStrength")
            .value;

            characterWrap.style.filter =
            `brightness(${dark})`;

        break;

        case "transparent":

            const transparent =
            document
            .getElementById("transparentStrength")
            .value;

            characterWrap.style.opacity =
            transparent;

        break;

        case "small":

            const small =
            document
            .getElementById("smallStrength")
            .value;

            characterWrap.style.transform =
            `scale(${small})`;

        break;

    }

}

function showNormal(){

    normalImg.classList.add("visible");
    talkImg.classList.remove("visible");

}

function showTalk(){

    normalImg.classList.remove("visible");
    talkImg.classList.add("visible");

}

const effectMode =
document.getElementById("effectMode");

const idleMode =
document.getElementById("idleMode");

const bounceStrengthWrap =
document.getElementById("bounceStrengthWrap");

const bounceSpeedWrap =
document.getElementById("bounceSpeedWrap");

const darkStrengthWrap =
document.getElementById("darkStrengthWrap");

const transparentStrengthWrap =
document.getElementById("transparentStrengthWrap");

const smallStrengthWrap =
document.getElementById("smallStrengthWrap");

function updateUIVisibility(){

    bounceStrengthWrap.style.display = "none";
    bounceSpeedWrap.style.display = "none";

    darkStrengthWrap.style.display = "none";
    transparentStrengthWrap.style.display = "none";
    smallStrengthWrap.style.display = "none";

    if(effectMode.value === "bounce"){

        bounceStrengthWrap.style.display =
        "flex";

        bounceSpeedWrap.style.display =
        "flex";

    }

    if(idleMode.value === "dark"){

        darkStrengthWrap.style.display =
        "flex";

    }

    if(idleMode.value === "transparent"){

        transparentStrengthWrap.style.display =
        "flex";

    }

    if(idleMode.value === "small"){

        smallStrengthWrap.style.display =
        "flex";

    }

}

effectMode.addEventListener(
    "change",
    updateUIVisibility
);

idleMode.addEventListener(
    "change",
    updateUIVisibility
);

function saveSettings(){

    const settings = {

        bgColor:
        document
        .getElementById("bgColor")
        .value,

        threshold:
        document
        .getElementById("threshold")
        .value,

        swapSpeed:
        document
        .getElementById("swapSpeed")
        .value,

        effectMode:
        document
        .getElementById("effectMode")
        .value,

        bounceStrength:
        document
        .getElementById("bounceStrength")
        .value,

        bounceSpeed:
        document
        .getElementById("bounceSpeed")
        .value,

        idleMode:
        document
        .getElementById("idleMode")
        .value,

        darkStrength:
        document
        .getElementById("darkStrength")
        .value,

        transparentStrength:
        document
        .getElementById("transparentStrength")
        .value,

        smallStrength:
        document
        .getElementById("smallStrength")
        .value

    };

    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(settings)
    );

}

function loadSettings(){

    const raw =
    localStorage.getItem(STORAGE_KEY);

    if(!raw) return;

    const settings =
    JSON.parse(raw);

    for(const key in settings){

        const element =
        document.getElementById(key);

        if(element){

            element.value =
            settings[key];

        }

    }

    document.body.style.background =
    document
    .getElementById("bgColor")
    .value;

    updateUIVisibility();

}

[
    "bgColor",
    "threshold",
    "swapSpeed",
    "effectMode",
    "bounceStrength",
    "bounceSpeed",
    "idleMode",
    "darkStrength",
    "transparentStrength",
    "smallStrength"
]
.forEach(id=>{

    const element =
    document.getElementById(id);

    element.addEventListener(
        "input",
        saveSettings
    );

    element.addEventListener(
        "change",
        saveSettings
    );

});

loadSettings();

document
.getElementById("startBtn")
.addEventListener("click", async()=>{

    try{

        const stream =
        await navigator
        .mediaDevices
        .getUserMedia({
            audio:true
        });

        const audioContext =
        new AudioContext();

        const source =
        audioContext
        .createMediaStreamSource(stream);

        const analyser =
        audioContext.createAnalyser();

        analyser.fftSize = 256;

        source.connect(analyser);

        const dataArray =
        new Uint8Array(
            analyser.frequencyBinCount
        );

        let swap = false;
        let lastSwap = 0;

        function update(){

            analyser
            .getByteFrequencyData(dataArray);

            let volume = 0;

            for(let i=0;i<dataArray.length;i++){

                volume += dataArray[i];

            }

            volume /= dataArray.length;

            const threshold =
            Number(
                document
                .getElementById("threshold")
                .value
            );

            const swapSpeed =
            Number(
                document
                .getElementById("swapSpeed")
                .value
            );

            document
            .getElementById("swapSpeedValue")
            .innerText =
            swapSpeed + "ms";

            const talking =
            volume > threshold;

            resetEffects();

            if(talking){

                if(hasTalkImage){

                    const now = Date.now();

                    if(now - lastSwap > swapSpeed){

                        swap = !swap;

                        lastSwap = now;

                    }

                    if(swap){

                        showTalk();

                    }else{

                        showNormal();

                    }

                }else{

                    showNormal();

                }

                applyTalkingEffect(
                    effectMode.value
                );

            }else{

                showNormal();

                applyIdleEffect(
                    idleMode.value
                );

            }

            requestAnimationFrame(update);

        }

        update();

    }catch(err){

        alert("マイク許可が必要");

        console.error(err);

    }

});

const panel =
document.getElementById("controls");

const panelToggle =
document.getElementById("panelToggle");

let closed = false;

panelToggle.addEventListener("click",()=>{

    closed = !closed;

    if(closed){

        panel.classList.add("closed");

        panelToggle.innerText =
        "▼ 開く";

    }else{

        panel.classList.remove("closed");

        panelToggle.innerText =
        "▲ 閉じる";

    }

});

updateUIVisibility();

</script>

</body>
</html>
