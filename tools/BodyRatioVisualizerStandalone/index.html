<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>身体比率ビジュアライザー</title>
<style>
body{font-family:sans-serif;background:#f4f4f5;margin:0;padding:24px;color:#18181b}
.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:24px}
.card{background:#fff;border-radius:24px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
input[type=number],input[type=range]{width:100%}
input[type=number]{padding:12px;border:1px solid #d4d4d8;border-radius:12px}
button{width:100%;padding:14px;border:none;border-radius:16px;background:#18181b;color:#fff;font-weight:700;cursor:pointer}
#preview{width:100%;border:1px solid #d4d4d8;border-radius:16px;margin-top:16px}
@media (max-width:900px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="wrap">
<div class="card">
<h1>身体比率ビジュアライザー</h1>

<p>身長 (cm)</p>
<input id="height" type="number" value="170" min="1" step="0.1">

<p>頭身: <span id="headRatioLabel">7.5</span></p>
<input id="headRatio" type="range" min="4" max="10" step="0.1" value="7.5">

<p>比率: 頭+上半身 <span id="upperLabel">50</span>% / 下半身 <span id="lowerLabel">50</span>%</p>
<input id="legSplit" type="range" min="0.35" max="0.65" step="0.01" value="0.5">

<p>線の太さ: <span id="lineWidthLabel">4</span>px</p>
<input id="lineWidth" type="range" min="1" max="12" step="1" value="4">

<label><input id="transparentBg" type="checkbox" checked> 透過PNGで書き出す</label>
<br><br>

<button onclick="exportPNG()">PNGを書き出して下に表示</button>
</div>

<div class="card">
<svg id="ratioSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 520" width="100%" height="520"></svg>
<img id="preview">
</div>
</div>

<script>
const els = {
  height: document.getElementById('height'),
  headRatio: document.getElementById('headRatio'),
  legSplit: document.getElementById('legSplit'),
  lineWidth: document.getElementById('lineWidth'),
  transparentBg: document.getElementById('transparentBg'),
  svg: document.getElementById('ratioSvg'),
  preview: document.getElementById('preview'),
  headRatioLabel: document.getElementById('headRatioLabel'),
  upperLabel: document.getElementById('upperLabel'),
  lowerLabel: document.getElementById('lowerLabel'),
  lineWidthLabel: document.getElementById('lineWidthLabel')
};

// 頭の大きさ(cm)を一定に保つための変数
let currentHeadSize = 170 / 7.5; 

function render() {
  const height = parseFloat(els.height.value) || 170;
  const headRatio = parseFloat(els.headRatio.value) || 7.5;
  const legSplit = parseFloat(els.legSplit.value) || 0.5;
  const lineWidth = parseInt(els.lineWidth.value) || 4;

  // ★ ここが重要！固定のスケール（1cm = 2px）にする
  // これで身長に応じて全体のピクセル数が変わるようになる
  const scale = 2.0; 

  // 数値計算
  const head = height / headRatio;
  const lower = height * legSplit;
  const upper = Math.max(0, height - lower - head);
  
  // 各パーツの描画サイズ(px)
  const headPx = head * scale;
  const upperPx = upper * scale;
  const lowerPx = lower * scale;

  // 描画位置（SVGのviewBoxが520pxあるので、上から40pxの位置を開始点にする）
  const topY = 40;
  const neckY = topY + headPx;
  const hipY = neckY + upperPx;
  const footY = hipY + lowerPx;
  const cx = 150;

  // ラベル更新
  els.headRatioLabel.textContent = headRatio.toFixed(1);
  els.upperLabel.textContent = Math.round((1 - legSplit) * 100);
  els.lowerLabel.textContent = Math.round(legSplit * 100);
  els.lineWidthLabel.textContent = lineWidth;

  // SVGの中身を更新（xmlns属性はHTML側で付与しておくのが確実だ）
  els.svg.innerHTML = `
    <circle cx="${cx}" cy="${topY + headPx / 2}" r="${headPx / 2}" fill="none" stroke="black" stroke-width="${lineWidth}" />
    <line x1="${cx - 35}" y1="${neckY}" x2="${cx + 35}" y2="${neckY}" stroke="black" stroke-width="${lineWidth}" />
    <line x1="${cx}" y1="${neckY}" x2="${cx}" y2="${footY}" stroke="black" stroke-width="${lineWidth}" />
    <line x1="${cx - 25}" y1="${hipY}" x2="${cx + 25}" y2="${hipY}" stroke="black" stroke-width="${lineWidth}" />
    <line x1="${cx - 25}" y1="${footY}" x2="${cx + 25}" y2="${footY}" stroke="black" stroke-width="${lineWidth}" />

    <text x="195" y="${topY + 15}" font-size="20">頭 ${head.toFixed(1)}cm</text>
    <text x="195" y="${neckY + upperPx / 2}" font-size="20">上半身 ${upper.toFixed(1)}cm</text>
    <text x="195" y="${hipY + lowerPx / 2}" font-size="20">下半身 ${lower.toFixed(1)}cm</text>
    <text x="195" y="${footY + 30}" font-size="20">${headRatio.toFixed(2)}頭身</text>
  `;

  // 長押し保存のために、描画のたびにPNGプレビューを更新する
  exportPNG();
}

function exportPNG() {
  const clone = els.svg.cloneNode(true);
  // テキストを除去（PNG書き出しには含めない）
  clone.querySelectorAll('text').forEach(n => n.remove());
  
  const source = new XMLSerializer().serializeToString(clone);
  const img = new Image();
  
  img.onload = () => {
    const canvas = document.createElement('canvas');
    // 高解像度で書き出し（SVGの4倍サイズ）
    canvas.width = 1200;
    canvas.height = 2080;
    const ctx = canvas.getContext('2d');

    if (!els.transparentBg.checked) {
      ctx.fillStyle = 'white';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // SVGをキャンバスに描画（比率は維持される）
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    els.preview.src = canvas.toDataURL('image/png');
  };

  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(source);
}

// 身長入力時の挙動：頭のサイズを固定して頭身を計算
els.height.addEventListener('input', () => {
  const height = parseFloat(els.height.value) || 0;
  if (height > 0) {
    els.headRatio.value = (height / currentHeadSize).toFixed(1);
  }
  render();
});

// 頭身スライダー操作時：新しい頭身から頭のサイズを逆算して保持
els.headRatio.addEventListener('input', () => {
  const height = parseFloat(els.height.value) || 170;
  const ratio = parseFloat(els.headRatio.value) || 7.5;
  currentHeadSize = height / ratio;
  render();
});

// その他のイベント
els.legSplit.addEventListener('input', render);
els.lineWidth.addEventListener('input', render);
els.transparentBg.addEventListener('change', render);

// 初期起動
render();
</script>

</body>
</html>
