<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CoC ステータスレーダーチャート</title>
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  display: grid;
  grid-template-columns: 380px 1fr;
  height: 100vh;
  overflow: hidden;
}

#controls {
  width: 100%;
  overflow-y: auto;
  background: #1b1b1b;
  padding: 16px;
  box-sizing: border-box;
  border-right: 1px solid #333;
}

#preview {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: background 0.2s ease;
}

canvas {
  background: transparent;
  max-width: 90vh;
  max-height: 90vh;
  width: auto;
  height: auto;
}

.panel {
  border: 1px solid #333;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 16px;
}

.panel h2 {
  margin-top: 0;
  font-size: 18px;
}

input[type="number"],
input[type="text"] {
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 8px;
  background: #222;
  border: 1px solid #444;
  color: white;
  padding: 6px;
  border-radius: 6px;
}

label {
  display: block;
  margin-top: 6px;
  margin-bottom: 4px;
}

button {
  background: #333;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  width: 100%;
  margin-top: 8px;
}

button:hover {
  background: #444;
}

.character-block {
  border: 1px solid #444;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 12px;
}

.small {
  font-size: 12px;
  color: #aaa;
}
</style>
</head>
<body>

<div id="controls">
  <div class="panel">
    <h2>グラフ設定</h2>

    <label>目盛り線・テキストカラー</label>
    <input type="color" id="gridColor" value="#ffffff" oninput="drawChart()" />

    <label>キャンバスサイズ</label>
    <input type="number" id="canvasSize" value="1200" min="500" max="4000" />

    <button onclick="downloadPNG()">透過PNG保存</button>
  </div>

  <div class="panel">
    <h2>探索者</h2>
    <div id="characters"></div>
    <button onclick="addCharacter()">探索者を追加</button>
  </div>
</div>

<div id="preview">
  <canvas id="chartCanvas" width="1200" height="1200"></canvas>
</div>

<script>
const labels = ["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"];
const baseMax = 18;
const scaleMarks = [0, 5, 10, 15, 18];

const characters = [];

function createDefaultCharacter(index) {
  return {
    name: `探索者${index + 1}`,
    color: randomColor(),
    opacity: 0.3,
    lineWidth: 3,
    stats: {
      STR: 10,
      CON: 10,
      POW: 10,
      DEX: 10,
      APP: 10,
      SIZ: 10,
      INT: 10,
      EDU: 10,
    }
  };
}

function randomColor() {
  return `#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}`;
}

function addCharacter() {
  characters.push(createDefaultCharacter(characters.length));
  renderCharacterControls();
  drawChart();
}

function renderCharacterControls() {
  const container = document.getElementById("characters");
  container.innerHTML = "";

  characters.forEach((char, index) => {
    const block = document.createElement("div");
    block.className = "character-block";

    let html = `
      <label>名前</label>
      <input type="text" value="${char.name}" onchange="updateName(${index}, this.value)">

      <label>カラー</label>
      <input type="color" value="${char.color}" onchange="updateColor(${index}, this.value)">

      <label>透明度 (${Math.round(char.opacity * 100)}%)</label>
      <input type="range" min="0" max="1" step="0.05" value="${char.opacity}" onchange="updateOpacity(${index}, this.value)">

      <label>線の太さ</label>
      <input type="number" min="1" max="10" value="${char.lineWidth}" onchange="updateLineWidth(${index}, this.value)">
    `;

    labels.forEach(label => {
      html += `
        <label>${label}</label>
        <input type="number" value="${char.stats[label]}" onchange="updateStat(${index}, '${label}', this.value)">
      `;
    });

    html += `<button onclick="removeCharacter(${index})">削除</button>`;

    block.innerHTML = html;
    container.appendChild(block);
  });
}

function updateName(index, value) {
  characters[index].name = value;
  drawChart();
}

function updateColor(index, value) {
  characters[index].color = value;
  drawChart();
}

function updateOpacity(index, value) {
  characters[index].opacity = parseFloat(value);
  renderCharacterControls();
  drawChart();
}

function updateLineWidth(index, value) {
  characters[index].lineWidth = parseFloat(value);
  drawChart();
}

function updateStat(index, stat, value) {
  characters[index].stats[stat] = parseFloat(value);
  drawChart();
}

function removeCharacter(index) {
  characters.splice(index, 1);
  renderCharacterControls();
  drawChart();
}

function drawChart() {
  const canvas = document.getElementById("chartCanvas");
  const size = parseInt(document.getElementById("canvasSize").value);

  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const centerX = size / 2;
  const centerY = size / 2;

  const maxStat = Math.max(baseMax, ...characters.flatMap(c => Object.values(c.stats)));

  const radius = size * 0.32;
  const outerRadius = radius * (maxStat / baseMax);

  const gridColor = document.getElementById("gridColor").value;

  updatePreviewBackground(gridColor);

  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;

  scaleMarks.forEach(mark => {
    const r = radius * (mark / baseMax);

    ctx.beginPath();

    labels.forEach((_, i) => {
      const angle = (-Math.PI / 2) + (Math.PI * 2 / labels.length) * i;
      const x = centerX + Math.cos(angle) * r;
      const y = centerY + Math.sin(angle) * r;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });

    ctx.closePath();
    ctx.stroke();

    ctx.fillStyle = gridColor;
    ctx.font = `${size * 0.015}px sans-serif`;
    ctx.fillText(mark, centerX + 5, centerY - r);
  });

  labels.forEach((label, i) => {
    const angle = (-Math.PI / 2) + (Math.PI * 2 / labels.length) * i;

    const x = centerX + Math.cos(angle) * outerRadius;
    const y = centerY + Math.sin(angle) * outerRadius;

    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(x, y);
    ctx.stroke();

    const labelX = centerX + Math.cos(angle) * (outerRadius + size * 0.05);
    const labelY = centerY + Math.sin(angle) * (outerRadius + size * 0.05);

    ctx.fillStyle = gridColor;
    ctx.font = `${size * 0.02}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, labelX, labelY);
  });

  characters.forEach((char, charIndex) => {
    ctx.beginPath();

    labels.forEach((label, i) => {
      const value = char.stats[label];
      const scaled = value / baseMax;
      const r = radius * scaled;

      const angle = (-Math.PI / 2) + (Math.PI * 2 / labels.length) * i;

      const x = centerX + Math.cos(angle) * r;
      const y = centerY + Math.sin(angle) * r;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });

    ctx.closePath();

    ctx.fillStyle = hexToRGBA(char.color, char.opacity);
    ctx.fill();

    ctx.strokeStyle = char.color;
    ctx.lineWidth = char.lineWidth;
    ctx.stroke();

    const legendX = size * 0.08;
    const legendY = size * 0.08 + charIndex * size * 0.04;

    ctx.fillStyle = char.color;
    ctx.fillRect(legendX, legendY, size * 0.02, size * 0.02);

    ctx.fillStyle = gridColor;
    ctx.font = `${size * 0.018}px sans-serif`;
    ctx.textAlign = "left";
    ctx.fillText(char.name, legendX + size * 0.03, legendY + size * 0.01);
  });
}

function hexToRGBA(hex, opacity) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${opacity})`;
}

function updatePreviewBackground(color) {
  const preview = document.getElementById("preview");

  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);

  const brightness = (r * 299 + g * 587 + b * 114) / 1000;

  if (brightness < 80) {
    preview.style.background = "#d9d9d9";
  } else {
    preview.style.background = "#111";
  }
}

function downloadPNG() {
  const canvas = document.getElementById("chartCanvas");
  const link = document.createElement("a");
  link.download = "coc_radar_chart.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

addCharacter();
</script>

</body>
</html>
