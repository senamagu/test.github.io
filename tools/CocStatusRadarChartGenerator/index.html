<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoC ステータスレーダーチャート</title>
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: sans-serif;
  display: grid;
  grid-template-columns: 380px 1fr;
  height: 100vh;
  overflow: hidden;
}

#controls {
  overflow-y: auto;
  background: #1b1b1b;
  border-right: 1px solid #333;
  padding: 16px;
  box-sizing: border-box;
}

#preview {
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s ease;
}

canvas {
  max-width: 90vh;
  max-height: 90vh;
  width: auto;
  height: auto;
}

.panel {
  border: 1px solid #333;
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 16px;
}

.panel h2 {
  margin-top: 0;
}

label {
  display: block;
  margin-top: 8px;
  margin-bottom: 4px;
}

input[type="number"],
input[type="text"],
textarea {
  width: 100%;
  box-sizing: border-box;
  background: #222;
  border: 1px solid #444;
  color: white;
  border-radius: 6px;
  padding: 8px;
}

textarea {
  resize: vertical;
}

button {
  width: 100%;
  background: #333;
  border: none;
  color: white;
  border-radius: 8px;
  padding: 10px;
  margin-top: 8px;
  cursor: pointer;
}

button:hover {
  background: #444;
}

.character-block {
  border: 1px solid #444;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 12px;
}

.character-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.character-title {
  font-weight: bold;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.character-content.closed {
  display: none;
}

.toggle-button {
  width: 40px;
  margin-top: 0;
  padding: 6px;
}
</style>
</head>
<body>
<div id="controls">
  <div class="panel">
    <h2>グラフ設定</h2>

    <label>目盛り線・テキストカラー</label>
    <input type="color" id="gridColor" value="#ffffff">

    <label>キャンバスサイズ</label>
    <input type="number" id="canvasSize" value="1200" min="500" max="4000">

    <label>いあきゃらチャパレ貼り付け</label>
    <textarea id="chatPaletteInput" rows="10"></textarea>

    <button id="importButton">ステータス読み込み</button>
    <button id="downloadButton">透過PNG保存</button>
  </div>

  <div class="panel">
    <h2>探索者</h2>
    <div id="characters"></div>
    <button id="addButton">探索者を追加</button>
  </div>
</div>

<div id="preview">
  <canvas id="chartCanvas" width="1200" height="1200"></canvas>
</div>

<script>
const LABELS = ["STR", "CON", "POW", "DEX", "APP", "SIZ", "INT", "EDU"];
const BASE_MAX = 18;
const SCALE_MARKS = [0, 5, 10, 15, 18];
const characters = [];

function randomColor() {
  return `#${Math.floor(Math.random() * 16777215)
    .toString(16)
    .padStart(6, "0")}`;
}

function createDefaultStats() {
  return {
    STR: 10,
    CON: 10,
    POW: 10,
    DEX: 10,
    APP: 10,
    SIZ: 10,
    INT: 10,
    EDU: 10
  };
}

function createCharacter(index) {
  return {
    collapsed: false,
    name: `探索者${index + 1}`,
    color: randomColor(),
    opacity: 0.3,
    lineWidth: 3,
    stats: createDefaultStats()
  };
}

function addCharacter(character = null) {
  characters.push(character || createCharacter(characters.length));
  renderCharacterControls();
  drawChart();
}

function removeCharacter(index) {
  characters.splice(index, 1);
  renderCharacterControls();
  drawChart();
}

function toggleCharacter(index) {
  characters[index].collapsed = !characters[index].collapsed;
  renderCharacterControls();
}

function updatePreviewBackground(color) {
  const preview = document.getElementById("preview");

  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);

  const brightness = (r * 299 + g * 587 + b * 114) / 1000;

  preview.style.background = brightness < 80 ? "#dddddd" : "#111111";
}

function hexToRGBA(hex, opacity) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);

  return `rgba(${r}, ${g}, ${b}, ${opacity})`;
}

function drawChart() {
  const canvas = document.getElementById("chartCanvas");
  const ctx = canvas.getContext("2d");
  const size = Number(document.getElementById("canvasSize").value) || 1200;
  const gridColor = document.getElementById("gridColor").value;

  canvas.width = size;
  canvas.height = size;

  updatePreviewBackground(gridColor);

  ctx.clearRect(0, 0, size, size);

  const centerX = size / 2;
  const centerY = size / 2;

  const highestStat = Math.max(
    BASE_MAX,
    ...characters.flatMap(character => Object.values(character.stats))
  );

  const radius = size * 0.32;
  const outerRadius = radius * (highestStat / BASE_MAX);

  ctx.strokeStyle = gridColor;
  ctx.fillStyle = gridColor;
  ctx.lineWidth = 1;

  SCALE_MARKS.forEach(mark => {
    const currentRadius = radius * (mark / BASE_MAX);

    ctx.beginPath();

    LABELS.forEach((_, index) => {
      const angle = -Math.PI / 2 + (Math.PI * 2 * index) / LABELS.length;
      const x = centerX + Math.cos(angle) * currentRadius;
      const y = centerY + Math.sin(angle) * currentRadius;

      if (index === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    });

    ctx.closePath();
    ctx.stroke();

    ctx.font = `${size * 0.015}px sans-serif`;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(mark, centerX + 8, centerY - currentRadius);
  });

  LABELS.forEach((label, index) => {
    const angle = -Math.PI / 2 + (Math.PI * 2 * index) / LABELS.length;

    const lineX = centerX + Math.cos(angle) * outerRadius;
    const lineY = centerY + Math.sin(angle) * outerRadius;

    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(lineX, lineY);
    ctx.stroke();

    const textX = centerX + Math.cos(angle) * (outerRadius + size * 0.05);
    const textY = centerY + Math.sin(angle) * (outerRadius + size * 0.05);

    ctx.font = `${size * 0.02}px sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, textX, textY);
  });

  characters.forEach((character, characterIndex) => {
    ctx.beginPath();

    LABELS.forEach((label, index) => {
      const value = Number(character.stats[label]) || 0;
      const scaledRadius = radius * (value / BASE_MAX);
      const angle = -Math.PI / 2 + (Math.PI * 2 * index) / LABELS.length;

      const x = centerX + Math.cos(angle) * scaledRadius;
      const y = centerY + Math.sin(angle) * scaledRadius;

      if (index === 0) {
        ctx.moveTo(x, y);
      } else {
        ctx.lineTo(x, y);
      }
    });

    ctx.closePath();

    ctx.fillStyle = hexToRGBA(character.color, character.opacity);
    ctx.fill();

    ctx.strokeStyle = character.color;
    ctx.lineWidth = character.lineWidth;
    ctx.stroke();

    const legendX = size * 0.08;
    const legendY = size * 0.08 + characterIndex * size * 0.04;

    ctx.fillStyle = character.color;
    ctx.fillRect(legendX, legendY, size * 0.02, size * 0.02);

    ctx.fillStyle = gridColor;
    ctx.font = `${size * 0.018}px sans-serif`;
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(character.name, legendX + size * 0.03, legendY + size * 0.01);
  });
}

function createStatInput(index, label, value) {
  const input = document.createElement("input");

  input.type = "number";
  input.value = value;

  input.addEventListener("input", event => {
    const parsed = Number(event.target.value);
    characters[index].stats[label] = Number.isFinite(parsed) ? parsed : 0;
    drawChart();
  });

  return input;
}

function renderCharacterControls() {
  const container = document.getElementById("characters");

  container.innerHTML = "";

  characters.forEach((character, index) => {
    const block = document.createElement("div");
    block.className = "character-block";

    const header = document.createElement("div");
    header.className = "character-header";

    const title = document.createElement("div");
    title.className = "character-title";
    title.textContent = character.name;

    const toggleButton = document.createElement("button");
    toggleButton.className = "toggle-button";
    toggleButton.textContent = character.collapsed ? "▼" : "▲";

    toggleButton.addEventListener("click", () => {
      toggleCharacter(index);
    });

    header.appendChild(title);
    header.appendChild(toggleButton);

    const content = document.createElement("div");
    content.className = `character-content ${character.collapsed ? "closed" : ""}`;

    const nameLabel = document.createElement("label");
    nameLabel.textContent = "名前";

    const nameInput = document.createElement("input");
    nameInput.type = "text";
    nameInput.value = character.name;

    nameInput.addEventListener("input", event => {
      character.name = event.target.value;
      title.textContent = character.name || "探索者";
      drawChart();
    });

    const colorLabel = document.createElement("label");
    colorLabel.textContent = "カラー";

    const colorInput = document.createElement("input");
    colorInput.type = "color";
    colorInput.value = character.color;

    colorInput.addEventListener("input", event => {
      character.color = event.target.value;
      drawChart();
    });

    const opacityLabel = document.createElement("label");
    opacityLabel.textContent = `透明度 (${Math.round(character.opacity * 100)}%)`;

    const opacityInput = document.createElement("input");
    opacityInput.type = "range";
    opacityInput.min = "0";
    opacityInput.max = "1";
    opacityInput.step = "0.05";
    opacityInput.value = character.opacity;

    opacityInput.addEventListener("input", event => {
      character.opacity = Number(event.target.value);
      opacityLabel.textContent = `透明度 (${Math.round(character.opacity * 100)}%)`;
      drawChart();
    });

    const lineWidthLabel = document.createElement("label");
    lineWidthLabel.textContent = "線の太さ";

    const lineWidthInput = document.createElement("input");
    lineWidthInput.type = "number";
    lineWidthInput.min = "1";
    lineWidthInput.max = "10";
    lineWidthInput.value = character.lineWidth;

    lineWidthInput.addEventListener("input", event => {
      const parsed = Number(event.target.value);
      character.lineWidth = Number.isFinite(parsed) ? parsed : 1;
      drawChart();
    });

    content.appendChild(nameLabel);
    content.appendChild(nameInput);
    content.appendChild(colorLabel);
    content.appendChild(colorInput);
    content.appendChild(opacityLabel);
    content.appendChild(opacityInput);
    content.appendChild(lineWidthLabel);
    content.appendChild(lineWidthInput);

    LABELS.forEach(label => {
      const statLabel = document.createElement("label");
      statLabel.textContent = label;

      content.appendChild(statLabel);
      content.appendChild(createStatInput(index, label, character.stats[label]));
    });

    const deleteButton = document.createElement("button");
    deleteButton.textContent = "削除";

    deleteButton.addEventListener("click", () => {
      removeCharacter(index);
    });

    content.appendChild(deleteButton);

    block.appendChild(header);
    block.appendChild(content);

    container.appendChild(block);
  });
}

function importChatPalette() {
  const textarea = document.getElementById("chatPaletteInput");
  const text = textarea.value;

  if (!text.trim()) {
    return;
  }

  const character = createCharacter(characters.length);

  LABELS.forEach(label => {
    const escapedLabel = label.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

    const regex = new RegExp(
      `CCB<=\\s*(\\d+)\\*5\\s*【${escapedLabel}\\s*×\\s*5】`,
      "i"
    );

    const match = text.match(regex);

    if (match) {
      character.stats[label] = Number(match[1]);
    }
  });

  addCharacter(character);

  textarea.value = "";
}

function downloadPNG() {
  const canvas = document.getElementById("chartCanvas");
  const link = document.createElement("a");

  link.download = "coc_radar_chart.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}

document.getElementById("gridColor").addEventListener("input", drawChart);
document.getElementById("canvasSize").addEventListener("input", drawChart);
document.getElementById("addButton").addEventListener("click", () => addCharacter());
document.getElementById("importButton").addEventListener("click", importChatPalette);
document.getElementById("downloadButton").addEventListener("click", downloadPNG);

addCharacter();
</script>
</body>
</html>
