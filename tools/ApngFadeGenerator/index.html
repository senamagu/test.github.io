<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>APNG Fade Generator</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
body{font-family:sans-serif;max-width:900px;margin:0 auto;padding:20px;background:#111;color:#eee}
.panel{background:#1b1b1b;border-radius:16px;padding:16px;margin-bottom:16px}
label{display:block;margin:10px 0 4px}
input,select,button{width:100%;padding:10px;border-radius:10px;border:none}
button{cursor:pointer;background:#333;color:#fff;margin-top:10px}
.preview{max-width:100%;max-height:420px;display:block;margin:10px auto;background:repeating-conic-gradient(#222 0 25%, #2b2b2b 0 50%) 50%/20px 20px;border-radius:12px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.small{font-size:14px;color:#bbb}
</style>
</head>
<body>
<div class="panel">
<h2>APNG フェードジェネレーター</h2>
<input id="file" type="file" accept="image/png,image/webp,image/jpeg" />
<div class="row">
<div>
<label>モード</label>
<select id="mode">
<option value="in">フェードIN</option>
<option value="out">フェードOUT</option>
<option value="inout">IN → 表示 → OUT</option>
</select>
</div>
<div>
<label>フェード枚数</label>
<input id="frameCount" type="number" min="2" max="120" step="1" value="12" />
</div>
</div>
<div class="row">
<div>
<label>フレームレート: <span id="fpsVal">24</span> FPS</label>
<input id="fps" type="range" min="1" max="60" value="24" />
</div>
<div>
<label>減色: <span id="colorVal">フルカラー</span></label>
<input id="colors" type="range" min="0" max="8" value="0" />
</div>
</div>
<button id="generate">生成</button>
<button id="optimize">5MB以内に抑える</button>
<button id="saveAll">連番PNGを一括保存（ZIP）</button>
<div class="small" id="size">サイズ: -</div>
<div id="preview" class="preview" style="padding:12px; overflow:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px;"></div>
</div>
<script>
const fps = document.getElementById('fps');
const fpsVal = document.getElementById('fpsVal');
const colors = document.getElementById('colors');
const colorVal = document.getElementById('colorVal');
const preview = document.getElementById('preview');
const sizeText = document.getElementById('size');
const download = document.getElementById('download');
let sourceImg = null;
let lastBlob = null;

const colorSteps = [0,256,128,64,32,16,8,4,2];
function updateLabels(){
 fpsVal.textContent = fps.value;
 const c = colorSteps[+colors.value];
 colorVal.textContent = c===0 ? 'フルカラー' : `${c}色`;
}
fps.oninput = colors.oninput = updateLabels; updateLabels();

document.getElementById('file').onchange = e => {
 const file = e.target.files[0];
 if(!file) return;
 const img = new Image();
 img.onload = ()=>{ sourceImg = img; preview.src = img.src; };
 img.src = URL.createObjectURL(file);
};

let generatedFrames = [];
async function buildFrames(limit5mb=false){
 if(!sourceImg) return;
 let fpsNum = +fps.value;
 let count = +document.getElementById('frameCount').value;
 let scale = 1;
 generatedFrames = [];
 preview.innerHTML = '';
 let totalSize = 0;

 while(true){
   generatedFrames = [];
   preview.innerHTML = '';
   totalSize = 0;
   const w = Math.round(sourceImg.width * scale);
   const h = Math.round(sourceImg.height * scale);
   const canvas = document.createElement('canvas');
   canvas.width = w; canvas.height = h;
   const ctx = canvas.getContext('2d');
   const mode = document.getElementById('mode').value;
   const holdFrames = mode === 'inout' ? Math.max(1, Math.round(fpsNum*0.5)) : 0;

   const alphas = [];
   if(mode==='in') for(let i=0;i<count;i++) alphas.push(i/(count-1));
   if(mode==='out') for(let i=0;i<count;i++) alphas.push(1-(i/(count-1)));
   if(mode==='inout') {
     for(let i=0;i<count;i++) alphas.push(i/(count-1));
     for(let i=0;i<holdFrames;i++) alphas.push(1);
     for(let i=0;i<count;i++) alphas.push(1-(i/(count-1)));
   }

   for (let i=0;i<alphas.length;i++) {
     ctx.clearRect(0,0,w,h);
     ctx.globalAlpha = alphas[i];
     ctx.drawImage(sourceImg,0,0,w,h);
     const dataUrl = canvas.toDataURL('image/png');
     generatedFrames.push(dataUrl);
     totalSize += Math.ceil((dataUrl.length * 3) / 4);
   }

   if(!limit5mb || totalSize <= 5*1024*1024 || scale <= 0.4) break;
   scale -= 0.1;
 }

 generatedFrames.forEach((src, i) => {
   const img = document.createElement('img');
   img.src = src;
   img.style.width = '100%';
   img.style.borderRadius = '8px';
   img.title = `frame_${String(i+1).padStart(3,'0')}.png`;
   preview.appendChild(img);
 });
 sizeText.textContent = `合計サイズ目安: ${(totalSize/1024/1024).toFixed(2)} MB / ${generatedFrames.length}枚`;
}

document.getElementById('generate').onclick = ()=>buildFrames(false);
document.getElementById('optimize').onclick = ()=>buildFrames(true);
document.getElementById('saveAll').onclick = async ()=>{
  if(!generatedFrames.length) return;
  const zip = new JSZip();
  generatedFrames.forEach((src,i)=>{
    zip.file(`frame_${String(i+1).padStart(3,'0')}.png`, src.split(',')[1], {base64:true});
  });
  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fade_frames.zip';
  a.click();
};
</script>
</body>
</html>
