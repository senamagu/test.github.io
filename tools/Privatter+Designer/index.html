<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privatter+ Designer</title>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #333333;
      --border-color: #cccccc;
      --toolbar-bg: #f5f5f5;
      --btn-bg: #ffffff;
      --btn-hover: #e0e0e0;
      --warn-color: #d9534f;
      --preview-bg: #fdfdfd;
    }
    body.dark-mode {
      --bg-color: #1e1e1e;
      --text-color: #e0e0e0;
      --border-color: #444444;
      --toolbar-bg: #2d2d2d;
      --btn-bg: #3c3c3c;
      --btn-hover: #555555;
      --warn-color: #ff6666;
      --preview-bg: #121212;
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    
    /* Toolbar */
    .toolbar { display: flex; flex-wrap: wrap; gap: 5px; padding: 8px; background: var(--toolbar-bg); border-bottom: 1px solid var(--border-color); align-items: center; }
    .toolbar button, .toolbar select, .toolbar input { padding: 4px 8px; font-size: 14px; background: var(--btn-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; cursor: pointer; }
    .toolbar button:hover { background: var(--btn-hover); }
    .toolbar .group { display: flex; gap: 5px; padding-right: 10px; border-right: 1px solid var(--border-color); align-items: center; }
    .toolbar label { display: flex; align-items: center; gap: 2px; font-size: 12px; }
    .toolbar input[type="color"] { padding: 0; width: 30px; height: 26px; }
    
    /* Layout */
    .main-area { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
    .left-panel { display: flex; flex-direction: column; width: 50%; min-width: 200px; }
    .resizer { width: 5px; background: var(--border-color); cursor: ew-resize; flex-shrink: 0; }
    .right-panel { display: flex; flex-direction: column; flex: 1; min-width: 200px; position: relative; }
    
    /* Editor & Preview */
    .editor, .preview { flex: 1; padding: 15px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; outline: none; line-height: 1.6; }
    .preview { background: var(--preview-bg); border-left: 1px solid var(--border-color); }
    .panel-title { padding: 5px 10px; background: var(--toolbar-bg); font-weight: bold; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; font-size: 14px; }
    
    /* HTML Output Area */
    .bottom-area { height: 25%; display: flex; flex-direction: column; border-top: 1px solid var(--border-color); }
    .html-editor { flex: 1; width: 100%; resize: none; padding: 10px; background: var(--bg-color); color: var(--text-color); border: none; outline: none; font-family: monospace; white-space: pre-wrap; }
    .bottom-toolbar { padding: 5px 10px; background: var(--toolbar-bg); display: flex; gap: 10px; justify-content: space-between; align-items: center; }
    
    /* Inspector */
    .inspector { position: absolute; top: 30px; right: 10px; width: 220px; background: var(--toolbar-bg); border: 1px solid var(--border-color); padding: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); display: none; z-index: 10; font-size: 13px; }
    .inspector label { display: block; margin-top: 5px; }
    .inspector input[type="text"], .inspector input[type="number"] { width: 100%; padding: 3px; background: var(--btn-bg); color: var(--text-color); border: 1px solid var(--border-color); }
    .inspector-close { position: absolute; top: 5px; right: 5px; cursor: pointer; font-weight: bold; }

    #warnings { color: var(--warn-color); font-size: 12px; margin-left: 10px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Markdown preview styles */
    .preview h1, .preview h2, .preview h3, .preview h4, .preview h5, .preview h6 { margin-top: 0.5em; margin-bottom: 0.5em; }
    .preview blockquote { border-left: 4px solid var(--border-color); margin: 0; padding-left: 1em; color: #777; }

    @media (max-width: 768px) {
      .main-area { flex-direction: column; }
      .left-panel, .right-panel { width: 100% !important; flex: 1; }
      .resizer { display: none; }
      .inspector { position: static; width: 100%; box-shadow: none; border-left: none; border-right: none; }
    }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="group">
      <button onclick="formatCmd('bold')" title="太字"><b>B</b></button>
      <button onclick="formatCmd('italic')" title="イタリック"><i>I</i></button>
      <button onclick="formatCmd('underline')" title="下線"><u>U</u></button>
      <button onclick="formatCmd('strikeThrough')" title="打ち消し"><s>S</s></button>
      <button onclick="removeFormatCmd()" title="選択範囲のスタイルをリセット">🚫 リセット</button>
    </div>

    <!-- 色指定 -->
    <div class="group">
      <label title="文字色">
        <input type="color" id="textColorPicker" onchange="syncColor(this.value, 'color')">
        <input type="text" id="textColorHex" placeholder="#ff0000" style="width: 75px;" onchange="syncColor(this.value, 'color')">
      </label>
      <label title="背景色">
        <input type="color" id="bgColorPicker" value="#ffffff" onchange="syncColor(this.value, 'background-color')">
        <input type="text" id="bgColorHex" placeholder="#ffffff" style="width: 75px;" onchange="syncColor(this.value, 'background-color')">
      </label>
    </div>

    <!-- サイズ・不透明度の自由入力 -->
    <div class="group">
      <input type="text" id="fontSizeInput" list="fontSizeList" placeholder="サイズ(16px等)" style="width: 100px;" onchange="applyStyle('font-size', this.value)">
      <datalist id="fontSizeList">
        <option value="12px"></option>
        <option value="16px"></option>
        <option value="20px"></option>
        <option value="24px"></option>
      </datalist>

      <input type="text" id="opacityInput" placeholder="不透明度(0~1)" style="width: 90px;" onchange="applyStyle('opacity', this.value)">
    </div>

    <div class="group">
      <button onclick="formatCmd('justifyLeft')" title="左寄せ">左</button>
      <button onclick="formatCmd('justifyCenter')" title="中央">中</button>
      <button onclick="formatCmd('justifyRight')" title="右寄せ">右</button>
    </div>

    <div class="group">
      <select id="blockSelect" onchange="insertBlock(this.value); this.value='';">
        <option value="">ブロック挿入</option>
        <option value="div">div</option>
        <option value="span">span</option>
        <option value="p">p</option>
        <option value="hr">hr</option>
        <option value="details">details/summary</option>
        <option value="ruby">ruby</option>
        <option value="ul">ul/li</option>
        <option value="ol">ol/li</option>
      </select>
      <select id="mdSelect" onchange="insertMarkdown(this.value); this.value='';">
        <option value="">Markdown</option>
        <option value="bold">**太字**</option>
        <option value="strike">~~打消~~</option>
        <option value="quote">> 引用</option>
        <option value="h1"># H1</option>
        <option value="h2">## H2</option>
        <option value="h3">### H3</option>
      </select>
    </div>

    <div class="group">
      <button onclick="undo()">↩ Undo</button>
      <button onclick="redo()">↪ Redo</button>
    </div>
    
    <div>
      <button onclick="toggleDarkMode()">🌗</button>
      <button onclick="toggleInspector()">🔍 インスペクタ</button>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main-area">
    <div class="left-panel" id="leftPanel">
      <div class="panel-title">エディタ (ビジュアル)</div>
      <div class="editor" id="editor" contenteditable="true"></div>
    </div>
    
    <div class="resizer" id="resizer"></div>
    
    <div class="right-panel">
      <div class="panel-title">プレビュー</div>
      <div class="preview" id="preview"></div>
      
      <!-- Inspector -->
      <div class="inspector" id="inspector">
        <span class="inspector-close" onclick="toggleInspector()">×</span>
        <b>現在の要素スタイル</b>
        <div id="inspector-tag">タグ: -</div>
        <label>色: <input type="text" id="insp-color" onchange="updateInsp('color')"></label>
        <label>背景: <input type="text" id="insp-bg" onchange="updateInsp('background-color')"></label>
        <label>サイズ: <input type="text" id="insp-size" onchange="updateInsp('font-size')"></label>
        <label>不透明度: <input type="text" id="insp-opacity" onchange="updateInsp('opacity')"></label>
        <label>文字間隔: <input type="text" id="insp-letter" onchange="updateInsp('letter-spacing')"></label>
        <label>行間: <input type="text" id="insp-line" onchange="updateInsp('line-height')"></label>
      </div>
    </div>
  </div>

  <!-- Bottom Output Area -->
  <div class="bottom-area">
    <div class="bottom-toolbar">
      <span>HTML出力 (Markdown維持)</span>
      <span id="warnings"></span>
      <div>
        <button onclick="formatHTML()">✨ 整形</button>
        <button onclick="cleanUpHTML()">🧹 不要タグ削除</button>
        <button onclick="copyHTML()">📋 コピー</button>
      </div>
    </div>
    <textarea class="html-editor" id="htmlEditor" spellcheck="false"></textarea>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const htmlEditor = document.getElementById('htmlEditor');
    const warningsEl = document.getElementById('warnings');
    const inspector = document.getElementById('inspector');
    let currentInspectElement = null;

    const ALLOWED_TAGS = ['DIV','SPAN','P','DETAILS','SUMMARY','RUBY','RT','RP','RB','UL','LI','OL','B','I','STRONG','EM','U','DEL','HR','BR','H1','H2','H3','H4','H5','H6','BLOCKQUOTE'];
    const ALLOWED_CSS = ['align-items','background','background-color','background-image','background-position','background-repeat','background-size','border','border-bottom','border-left','border-radius','border-right','border-top','bottom','color','display','flex-shrink','font-family','font-size','font-style','font-weight','height','letter-spacing','line-height','margin','margin-bottom','margin-left','margin-right','margin-top','max-width','min-width','opacity','overflow','overflow-x','overflow-y','padding','padding-bottom','padding-left','padding-right','padding-top','position','right','text-align','text-justify','width','word-break','word-wrap','z-index'];

    let historyStack = [];
    let historyIndex = -1;
    const MAX_HISTORY = 100;

    // ▼ 選択範囲(Selection)のバックアップ機能 ▼
    let savedRange = null;
    document.addEventListener('selectionchange', () => {
      const selection = window.getSelection();
      if (selection.rangeCount > 0) {
        const range = selection.getRangeAt(0);
        // エディタ内の選択範囲ならバックアップを取る
        if (editor.contains(range.commonAncestorContainer) || editor === range.commonAncestorContainer) {
          savedRange = range.cloneRange();
        }
      }
    });

    function restoreSelection() {
      const selection = window.getSelection();
      if ((!selection.rangeCount || selection.isCollapsed) && savedRange) {
        selection.removeAllRanges();
        selection.addRange(savedRange);
      }
    }

    function saveHistory() {
      const currentHtml = editor.innerHTML;
      if (historyIndex >= 0 && historyStack[historyIndex] === currentHtml) return;
      historyStack = historyStack.slice(0, historyIndex + 1);
      historyStack.push(currentHtml);
      if (historyStack.length > MAX_HISTORY) historyStack.shift();
      historyIndex = historyStack.length - 1;
      localStorage.setItem('privatter_designer_save', currentHtml);
    }

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        editor.innerHTML = historyStack[historyIndex];
        syncToHTML();
      }
    }

    function redo() {
      if (historyIndex < historyStack.length - 1) {
        historyIndex++;
        editor.innerHTML = historyStack[historyIndex];
        syncToHTML();
      }
    }

    window.onload = () => {
      const saved = localStorage.getItem('privatter_designer_save');
      if (saved) editor.innerHTML = saved;
      saveHistory();
      syncToHTML();
      if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    };

    editor.addEventListener('input', () => { syncToHTML(); saveHistory(); });

    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        restoreSelection();
        const selection = window.getSelection();
        if (!selection.rangeCount) return;
        const range = selection.getRangeAt(0);
        
        const textNode = document.createTextNode('\n');
        range.deleteContents();
        range.insertNode(textNode);
        
        range.setStartAfter(textNode);
        range.setEndAfter(textNode);
        selection.removeAllRanges();
        selection.addRange(range);
        
        syncToHTML();
        saveHistory();
      }
    });

    editor.addEventListener('click', updateInspectorDisplay);
    editor.addEventListener('keyup', updateInspectorDisplay);

    htmlEditor.addEventListener('input', () => {
      editor.innerHTML = htmlEditor.value;
      updatePreview(htmlEditor.value);
      validateContent(htmlEditor.value);
      saveHistory();
    });

    // ▼ Markdownパース (プレビュー用のみ) ▼
    function parseMarkdown(htmlStr) {
      let res = htmlStr;
      res = res.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
      res = res.replace(/~~(.*?)~~/g, '<del>$1</del>');

      let lines = res.split('\n');
      for (let i = 0; i < lines.length; i++) {
        let line = lines[i];
        
        const headingMatch = line.match(/^(<[^>]+>)*(#{1,6})\s+(.*?)(<\/[^>]+>)*$/);
        if (headingMatch) {
          const tagsStart = headingMatch[1] || '';
          const level = headingMatch[2].length;
          const content = headingMatch[3];
          const tagsEnd = headingMatch[4] || '';
          lines[i] = `${tagsStart}<h${level}>${content}</h${level}>${tagsEnd}`;
          continue;
        }
        
        // 引用パース (> または &gt; または 全角＞ に対応)
        const quoteMatch = line.match(/^(<[^>]+>)*(>|&gt;|＞)\s?(.*?)(<\/[^>]+>)*$/);
        if (quoteMatch) {
          const tagsStart = quoteMatch[1] || '';
          const content = quoteMatch[3];
          const tagsEnd = quoteMatch[4] || '';
          // プレビュー用にインラインスタイルを当てる
          lines[i] = `${tagsStart}<blockquote style="border-left: 4px solid var(--border-color); margin: 0; padding-left: 1em; color: #777;">${content}</blockquote>${tagsEnd}`;
        }
      }
      return lines.join('\n');
    }

    function syncToHTML() {
      let html = editor.innerHTML;
      
      // HTML出力はMarkdownを維持したまま
      htmlEditor.value = html;

      // プレビューにはMarkdownをパースしたHTMLを適用
      let previewHTML = parseMarkdown(html);
      preview.innerHTML = previewHTML;

      validateContent(html);
    }

    function formatCmd(cmd) {
      restoreSelection();
      document.execCommand(cmd, false, null);
      cleanEmptySpans();
      syncToHTML();
      saveHistory();
      editor.focus();
    }

    // ▼ スタイル適用（重複防止 ＆ 最新優先） ▼
    function applyStyle(property, value) {
      if(!value) return;
      restoreSelection();
      
      const selection = window.getSelection();
      if (!selection.rangeCount || selection.isCollapsed) return;

      const range = selection.getRangeAt(0);
      const content = range.extractContents();
      
      // 抜き出した要素から同じプロパティを消去 (タグ重複・競合防止)
      const tempDiv = document.createElement('div');
      tempDiv.appendChild(content);
      const allElements = tempDiv.querySelectorAll('*');
      allElements.forEach(el => {
        if (el.style) el.style[property] = '';
      });

      // 新しいSpanで囲んで最後に適用
      const span = document.createElement('span');
      span.style[property] = value;
      
      const frag = document.createDocumentFragment();
      while(tempDiv.firstChild) frag.appendChild(tempDiv.firstChild);
      span.appendChild(frag);
      
      range.insertNode(span);

      // 適用した文字を選択状態に戻す（連続して変更できるように）
      const newRange = document.createRange();
      newRange.selectNodeContents(span);
      selection.removeAllRanges();
      selection.addRange(newRange);
      
      editor.focus();
      cleanEmptySpans();
      syncToHTML();
      saveHistory();
    }

    // ▼ スタイルリセット機能 ▼
    function removeFormatCmd() {
      restoreSelection();
      const selection = window.getSelection();
      if (!selection.rangeCount || selection.isCollapsed) return;

      // ブラウザ標準のフォーマット解除
      document.execCommand('removeFormat', false, null);

      // インラインCSSを手動で完全に剥がす
      const range = selection.getRangeAt(0);
      const content = range.extractContents();
      
      const tempDiv = document.createElement('div');
      tempDiv.appendChild(content);
      
      const allElements = tempDiv.querySelectorAll('*');
      allElements.forEach(el => {
        el.removeAttribute('style');
      });

      const frag = document.createDocumentFragment();
      while(tempDiv.firstChild) frag.appendChild(tempDiv.firstChild);
      range.insertNode(frag);

      editor.focus();
      cleanEmptySpans();
      syncToHTML();
      saveHistory();
    }

    function syncColor(val, type) {
      if (val && val[0] !== '#') val = '#' + val; 
      const isValidHex = /^#[0-9A-F]{6}$/i.test(val);
      
      if (type === 'color') {
        if (isValidHex) document.getElementById('textColorPicker').value = val;
        document.getElementById('textColorHex').value = val;
      } else {
        if (isValidHex) document.getElementById('bgColorPicker').value = val;
        document.getElementById('bgColorHex').value = val;
      }
      applyStyle(type, val);
    }

    function insertBlock(type) {
      if (!type) return;
      restoreSelection();
      let html = '';
      if (type === 'details') html = '<details><summary>詳細</summary><p>テキスト</p></details>';
      else if (type === 'ruby') html = '<ruby>漢字<rt>かんじ</rt></ruby>';
      else if (type === 'ul') html = '<ul><li>リスト1</li></ul>';
      else if (type === 'ol') html = '<ol><li>リスト1</li></ol>';
      else if (type === 'hr') html = '<hr>';
      else html = `<${type}>テキスト</${type}>`;
      
      document.execCommand('insertHTML', false, html);
      syncToHTML();
      saveHistory();
    }

    function insertMarkdown(type) {
      if (!type) return;
      restoreSelection();
      let text = '';
      switch(type) {
        case 'bold': text = '**太字**'; break;
        case 'strike': text = '~~打ち消し~~'; break;
        case 'quote': text = '\n> 引用\n'; break;
        case 'h1': text = '\n# H1\n'; break;
        case 'h2': text = '\n## H2\n'; break;
        case 'h3': text = '\n### H3\n'; break;
      }
      document.execCommand('insertText', false, text);
      syncToHTML();
      saveHistory();
    }

    function validateContent(htmlStr) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(htmlStr, 'text/html');
      let errors = [];

      const all = doc.body.getElementsByTagName('*');
      for (let el of all) {
        if (!ALLOWED_TAGS.includes(el.tagName)) {
          errors.push(`<${el.tagName.toLowerCase()}> は非推奨`);
        }
        for (let i = 0; i < el.style.length; i++) {
          const prop = el.style[i];
          if (!ALLOWED_CSS.includes(prop)) {
            errors.push(`CSS '${prop}' は非推奨`);
          }
        }
      }
      const uniqueErrors = [...new Set(errors)];
      warningsEl.textContent = uniqueErrors.length > 0 ? "⚠️ 警告: " + uniqueErrors.join(', ') : "✅ 問題なし";
    }

    function cleanEmptySpans() {
      const spans = editor.querySelectorAll('span');
      spans.forEach(span => {
        if (!span.getAttribute('style') && !span.className) {
          const frag = document.createDocumentFragment();
          while (span.firstChild) frag.appendChild(span.firstChild);
          span.parentNode.replaceChild(frag, span);
        }
      });
    }

    function cleanUpHTML() {
      cleanEmptySpans();
      syncToHTML();
      saveHistory();
    }

    function formatHTML() {
      let html = htmlEditor.value;
      html = html.replace(/></g, '>\n<');
      htmlEditor.value = html;
      editor.innerHTML = html; 
      syncToHTML();
      saveHistory();
    }

    function copyHTML() {
      htmlEditor.select();
      document.execCommand('copy');
      alert('コピーしたぜ同志！');
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    const resizer = document.getElementById('resizer');
    const leftPanel = document.getElementById('leftPanel');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => { isResizing = true; });
    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const newWidth = e.clientX;
      if (newWidth > 200 && newWidth < window.innerWidth - 200) {
        leftPanel.style.width = newWidth + 'px';
      }
    });
    document.addEventListener('mouseup', () => { isResizing = false; });

    function toggleInspector() {
      inspector.style.display = inspector.style.display === 'block' ? 'none' : 'block';
    }

    function updateInspectorDisplay() {
      if (inspector.style.display !== 'block') return;
      restoreSelection();
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      
      let node = selection.getRangeAt(0).commonAncestorContainer;
      if (node.nodeType === 3) node = node.parentNode;

      if (node && node !== editor) {
        currentInspectElement = node;
        document.getElementById('inspector-tag').textContent = `タグ: <${node.tagName.toLowerCase()}>`;
        document.getElementById('insp-color').value = node.style.color || '';
        document.getElementById('insp-bg').value = node.style.backgroundColor || '';
        document.getElementById('insp-size').value = node.style.fontSize || '';
        document.getElementById('insp-opacity').value = node.style.opacity || '';
        document.getElementById('insp-letter').value = node.style.letterSpacing || '';
        document.getElementById('insp-line').value = node.style.lineHeight || '';
      } else {
        currentInspectElement = null;
        document.getElementById('inspector-tag').textContent = 'タグ: -';
      }
    }

    function updateInsp(prop) {
      if (!currentInspectElement) return;
      const val = document.getElementById(`insp-${prop.split('-')[1] || prop}`).value;
      currentInspectElement.style[prop] = val;
      syncToHTML();
      saveHistory();
    }
  </script>
</body>
</html>
